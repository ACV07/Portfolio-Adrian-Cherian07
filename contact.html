    <style>
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-lg);
            position: relative;
            z-index: 10;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-cyan);
            font-family: var(--font-mono);
            font-size: 1rem;
            transition: transform var(--transition-fast), color var(--transition-fast);
        }

        .back-btn:hover {
            transform: translateX(-5px);
            color: #fff;
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        /* =========================================
           Contact Page - Row Layout
           ========================================= */
        .contact-perspective {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 70vh;
            padding-top: 2rem;
        }

        .contact-list-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 2rem;
            font-family: var(--font-sans);
            font-weight: 800;
            text-align: left;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--accent-cyan);
        }

        .contact-rows-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-row {
            display: flex;
            align-items: center;
            padding: 1.5rem 2rem;
            background: rgba(22, 27, 34, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .contact-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-cyan);
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s ease;
        }

        .contact-row:hover {
            background: rgba(30, 40, 50, 0.8);
            border-color: rgba(0, 229, 255, 0.3);
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .contact-row:hover::before {
            transform: scaleY(1);
        }

        .row-icon-cell {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-right: 1.5rem;
            transition: all 0.4s ease;
        }

        .row-logo {
            width: 24px;
            height: 24px;
            color: var(--accent-cyan);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .contact-row:hover .row-icon-cell {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .contact-row:hover .row-logo {
            transform: scale(1.2);
        }

        /* Specific logo colors on hover */
        .contact-row:hover .linkedin-color {
            color: #0077b5;
        }

        .contact-row:hover .github-color {
            color: #ffffff;
        }
        
        .contact-row:hover .instagram-color {
            color: #E1306C;
        }

        .row-details {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .row-label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
        }

        .row-value {
            font-size: 1.2rem;
            color: var(--text-primary);
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .contact-row:hover .row-value {
            color: #fff;
        }

        .row-arrow {
            font-size: 1.5rem;
            color: var(--text-secondary);
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .contact-row:hover .row-arrow {
            opacity: 1;
            transform: translateX(0);
            color: var(--accent-cyan);
        }

        /* Professional Scroll Reveal Animation */
        .animate-row {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .animate-row.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .contact-row {
                padding: 1rem;
            }
            .row-icon-cell {
                margin-right: 1rem;
            }
            .row-value {
                font-size: 1rem;
                word-break: break-all;
            }
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

    <script src="script.js"></script>
    <script>
        // Professional fade-in staggered animation for rows
        document.addEventListener('DOMContentLoaded', () => {
            const rows = document.querySelectorAll('.animate-row');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            rows.forEach(row => {
                observer.observe(row);
            });
        });
    </script>
